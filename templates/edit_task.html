<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Task</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/dashboard.css') }}">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h2>🎓 Student Task Manager</h2>

        <ul>

            <li><a href="/dashboard">🏠 Dashboard</a></li>

            <li><a href="/tasks">📚 Tasks</a></li>

            <li><a href="/students">👨‍🎓 Students</a></li>

            <li><a href="/calendar">📅 Calendar</a></li>

            <li><a href="/analytics">📊 Analytics</a></li>

            <li><a href="/attendance">Attendance</a></li>

            <li><a href="/files">📂 Files</a></li>

            <li><a href="/reports">📄 Reports</a></li>

            <li><a href="/profile">👤 Profile</a></li>

            <li><a href="/logout">🚪 Logout</a></li>

        </ul>

    </div>

    <!-- Main Content -->

    <div class="main-content">

        <div class="task-form">

            <h1>✏ Edit Task</h1>

            <form action="/update-task/{{ task.id }}"
                  method="POST">

                <input
                    type="text"
                    name="title"
                    value="{{ task.title }}"
                    required>

                <input
                    type="text"
                    name="subject"
                    value="{{ task.subject }}"
                    required>

                <textarea
                    name="description"
                    rows="4">{{ task.description }}</textarea>

                <select name="priority">

                    <option value="High">High</option>

                    <option value="Medium">Medium</option>

                    <option value="Low">Low</option>

                </select>

                <input
                    type="number"
                    name="progress"
                    min="0"
                    max="100"
                    value="{{ task.progress }}">

                <button type="submit">

                    Update Task

                </button>

            </form>

            <br>

            <a href="/tasks">

                <button>

                    Back to Tasks

                </button>

            </a>

        </div>

    </div>

</div>

</body>

</html>
